name: Keep KAU services online

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/keep-kau-online.yml"
  schedule:
    # 08:00-19:50 Asia/Almaty (UTC+5), every 10 minutes.
    # Keep this lightweight: health checks prevent sleep without hammering data APIs.
    - cron: "*/10 3-14 * * *"
    # Final lightweight check at 20:00 Asia/Almaty.
    - cron: "0 15 * * *"
  workflow_dispatch:

concurrency:
  group: keep-kau-online
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  warm-and-check:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: Keep Render services awake without triggering API rate limits
        shell: bash
        run: |
          set -euo pipefail
          for url in \
            "https://kau-ads-service.onrender.com/health" \
            "https://kau-intelligence-service.onrender.com/health" \
            "https://kau-crm-service.onrender.com/health" \
            "https://kau-command-center-api-cloud.onrender.com/health"
          do
            echo "Waking ${url}"
            curl --fail --silent --show-error --location \
              --retry 2 --retry-all-errors --retry-delay 8 \
              --connect-timeout 25 --max-time 90 "$url" >/dev/null
            sleep 6
          done

          echo "KAU services received lightweight keepalive pings. Heavy dashboards are loaded on user refresh to avoid HTTP 429."
